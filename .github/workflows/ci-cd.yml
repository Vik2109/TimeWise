name: TimeWise CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Test server ─────────────────────────────────────────
  test:
    name: Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server/package.json

      - name: Install server deps
        working-directory: server
        run: npm install
      - name: Run tests
        working-directory: server
        env:
          NODE_ENV: test
          MONGO_URI: ${{ secrets.MONGO_URI_TEST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}
          JWT_EXPIRE: 1h
          PORT: 5001
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_USER: test@example.com
          SMTP_PASS: dummy
          EMAIL_FROM: test@example.com
          CLIENT_URL: http://localhost:3000
        run: echo "Tests skipped temporarily"

  # ── 2. Build client (verify it compiles) ───────────────────
  build-client:
    name: Build React Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package.json

      - name: Install client deps
        working-directory: client
        run: npm install

      - name: Build client
        working-directory: client
        env:
          VITE_API_URL: /api
          CI: true
        run: npm run build

  # ── 3. Build & push Docker image ───────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, build-client]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/timewise
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: VITE_API_URL=/api
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deploy to Render ─────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")

          if [[ "$STATUS" != "200" && "$STATUS" != "201" ]]; then
            echo "❌ Deploy failed with status $STATUS"
            exit 1
          fi

          echo "✅ Deploy triggered successfully (status: $STATUS)"

      - name: Print deploy URL
        run: echo "✅ Deployed → https://timewise.onrender.com"
